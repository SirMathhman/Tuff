# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
  - repo: local
    hooks:
      - id: mvn-test
        name: Maven Tests
        entry: mvn test --quiet
        language: system
        pass_filenames: false
        always_run: true
        stages: [commit]
