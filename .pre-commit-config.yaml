repos:
  - repo: local
    hooks:
      - id: cargo-test
        name: cargo test
        entry: cargo test
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: tuff-lints
        name: tuff lints (custom)
        entry: cargo run --quiet --bin tuff_lints -- --baseline .tuff_lints_baseline.json --max-fn-nesting 2 --max-struct-fields 5
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: pmd-cpd
        name: pmd cpd
        entry: pmd cpd --dir src --language rust --minimum-tokens 50 --ignore-identifiers --ignore-literals
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: file-length-check
        name: check max file length 500 lines
        entry: pwsh check_file_length.ps1
        language: system
        pass_filenames: false
        stages: [pre-commit]
