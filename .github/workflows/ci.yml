name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang and clang-tidy
        run: sudo apt-get update && sudo apt-get install -y clang clang-tidy
      - name: Run linter
        run: make lint
      - name: Build and run tests
        run: make test
