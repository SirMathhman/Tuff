name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang
      - name: Build and run tests
        run: |
          clang -Wall -Wextra -std=c11 -Isrc src/interpret.c tests/test_interpret.c -o test_interpret
          ./test_interpret
